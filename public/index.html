<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRC Game Manual Interpreter</title>
  <meta name="description"
    content="Ask questions about the FRC Game Manual and get accurate, rule-based answers powered by AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">
          <span class="logo-gear">⚙</span>
        </div>
        <div class="brand-text">
          <h1 class="brand-title">FRC AI</h1>
          <p class="brand-sub">Game Manual Interpreter</p>
        </div>
      </div>
      <div class="header-badge">
        <span class="badge-dot"></span>
        <span>AI Powered</span>
      </div>
    </div>
  </header>

  <main class="app-container">

    <section class="chat-stream" id="chatWindow">
      <div class="welcome-card" id="welcomeMsg">
        <div class="welcome-icon">🤖</div>
        <h2 class="welcome-heading">FRC Rules Reference Engine</h2>
        <p class="welcome-lead">
          Upload layout blueprints, electrical schematics, or ask direct text questions. 
          The system will cross-reference your inputs with official FRC Game manuals and local team update logs.
        </p>
        
        <div class="suggestions-box">
          <p class="suggestions-title">Quick Rule Checks:</p>
          <div class="suggestions-grid">
            <button class="chip" onclick="fillQuestion('What are the total robot weight limits?')">Robot weight limits</button>
            <button class="chip" onclick="fillQuestion('How is scoring calculated?')">Scoring rules</button>
            <button class="chip" onclick="fillQuestion('What are the bumper requirements?')">Bumper requirements</button>
            <button class="chip" onclick="fillQuestion('What happens during autonomous period?')">Autonomous period</button>
          </div>
        </div>
      </div>
    </section>

    <div class="input-bar-wrapper">
      <form class="input-bar" id="queryForm" autocomplete="off">
        
        <input type="file" id="imageInput" accept="image/*" style="display: none;" aria-label="Upload structural image or diagram" />
        
        <button type="button" class="upload-btn" id="uploadBtn" aria-label="Attach rule diagram or field blueprint">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
          </svg>
        </button>

        <div class="input-content-stack" style="flex-grow: 1; display: flex; flex-direction: column;">
          <div id="uploadPreview" class="upload-preview-container" style="padding: 2px 0; margin-bottom: 4px;"></div>
          
          <textarea id="questionInput" class="input-field"
            placeholder="Ask a question about the most recent FRC Game Manual or Team Updates..." rows="1"
            aria-label="Question input" maxlength="1000"></textarea>
        </div>
        
        <button type="submit" class="send-btn" id="sendBtn" aria-label="Send question">
          <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>

      </form>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
